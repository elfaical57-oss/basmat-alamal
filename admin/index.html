<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة — جمعية بصمة الأمل</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #2980b9; --blue-dark: #1a6fa0; --red: #c0392b;
      --white: #fff; --bg: #f0f6fc; --text: #1a1a2e; --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--blue-dark); color: var(--white);
      padding: 0.9rem 2rem; display: flex; align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid var(--red);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .header-actions { display: flex; gap: 0.75rem; align-items: center; }
    .user-email { font-size: 0.85rem; opacity: 0.8; }
    .btn { border: none; border-radius: var(--radius); padding: 0.5rem 1.2rem; font-family: inherit; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-red { background: var(--red); color: var(--white); }
    .btn-blue { background: var(--blue); color: var(--white); }
    .btn-white { background: var(--white); color: var(--blue-dark); }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    }
    .login-card {
      background: var(--white); border-radius: 16px;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-card h2 { color: var(--blue-dark); font-size: 1.4rem; margin-bottom: 0.25rem; }
    .login-card p { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .login-logo { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .form-group { margin-bottom: 1rem; text-align: right; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--blue-dark); margin-bottom: 0.3rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.65rem 0.9rem; border: 2px solid #dde6f0;
      border-radius: var(--radius); font-family: inherit; font-size: 0.95rem;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--blue); }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .login-btn { width: 100%; background: var(--blue); color: var(--white); padding: 0.8rem; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
    .login-btn:hover { background: var(--blue-dark); }
    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

    /* ── DASHBOARD ── */
    #dashboard-screen { display: none; }
    .dashboard { max-width: 900px; margin: 2rem auto; padding: 0 1.25rem; }
    .dash-title { font-size: 1.3rem; font-weight: 900; color: var(--blue-dark); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; }

    /* ── POST FORM ── */
    #post-form-screen { display: none; }
    .form-card { background: var(--white); border-radius: var(--radius); padding: 2rem; max-width: 700px; margin: 2rem auto; box-shadow: 0 2px 16px rgba(41,128,185,0.1); }
    .form-card h2 { color: var(--blue-dark); font-size: 1.2rem; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 3px solid var(--red); }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }

    /* ── POST CARDS ── */
    .posts-list { display: flex; flex-direction: column; gap: 1rem; }
    .post-item {
      background: var(--white); border-radius: var(--radius);
      padding: 1.25rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
      box-shadow: 0 2px 12px rgba(41,128,185,0.08);
      border-right: 5px solid var(--blue);
    }
    .post-item-info h3 { font-size: 1rem; font-weight: 700; color: var(--blue-dark); }
    .post-item-info span { font-size: 0.8rem; color: #888; }
    .post-item-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .empty-state { text-align: center; padding: 3rem; color: #888; font-size: 1rem; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--blue-dark); color: var(--white); padding: 0.75rem 1.5rem; border-radius: 30px; font-weight: 600; font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999; }
    .toast.show { opacity: 1; }

    @media (max-width: 500px) {
      header { padding: 0.75rem 1rem; }
      .dashboard { margin: 1rem auto; }
      .post-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🤲</div>
    <h2>جمعية بصمة الأمل</h2>
    <p>لوحة إدارة الأخبار</p>
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="login-email" placeholder="example@email.com" dir="ltr" />
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="login-password" placeholder="••••••••" dir="ltr" />
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- ══ HEADER (shown when logged in) ══ -->
<header id="main-header" style="display:none;">
  <h1>🤲 لوحة الإدارة — بصمة الأمل</h1>
  <div class="header-actions">
    <span class="user-email" id="user-email-display"></span>
    <a href="/" class="btn btn-white btn-sm">← الموقع</a>
    <button class="btn btn-red btn-sm" onclick="doLogout()">خروج</button>
  </div>
</header>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard-screen">
  <div class="dashboard">
    <div class="dash-title">
      <span>الأخبار المنشورة</span>
      <button class="btn btn-blue" onclick="showPostForm()">+ خبر جديد</button>
    </div>
    <div class="posts-list" id="posts-list">
      <div class="empty-state">جاري التحميل…</div>
    </div>
  </div>
</div>

<!-- ══ POST FORM ══ -->
<div id="post-form-screen">
  <div class="form-card" style="margin-top:2rem;">
    <h2 id="form-title">خبر جديد</h2>
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label>العنوان *</label>
      <input type="text" id="post-title" placeholder="عنوان الخبر" />
    </div>
    <div class="form-group">
      <label>المحتوى *</label>
      <textarea id="post-content" placeholder="اكتب محتوى الخبر هنا…"></textarea>
    </div>
    <div class="form-group">
      <label>رابط الصورة (اختياري)</label>
      <input type="url" id="post-image" placeholder="https://..." dir="ltr" />
    </div>
    <div class="form-actions">
      <button class="btn btn-blue" onclick="savePost()">حفظ ونشر</button>
      <button class="btn btn-white" onclick="showDashboard()" style="border:2px solid #dde6f0;">إلغاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://yyjbcduakapgblcgqieq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SQxTQ9a2HcskaUmAgFOVrw_qAvbIZlx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── AUTH ── */
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = 'بريد إلكتروني أو كلمة مرور خاطئة.'; return; }
  enterApp();
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('login-screen').style.display    = 'flex';
  document.getElementById('main-header').style.display     = 'none';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('post-form-screen').style.display = 'none';
}

async function enterApp() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  document.getElementById('login-screen').style.display    = 'none';
  document.getElementById('main-header').style.display     = 'flex';
  document.getElementById('user-email-display').textContent = user.email;
  showDashboard();
}

/* ── NAVIGATION ── */
function showDashboard() {
  document.getElementById('dashboard-screen').style.display  = 'block';
  document.getElementById('post-form-screen').style.display  = 'none';
  loadPosts();
}

function showPostForm(post = null) {
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('post-form-screen').style.display = 'block';
  document.getElementById('form-title').textContent = post ? 'تعديل الخبر' : 'خبر جديد';
  document.getElementById('edit-id').value      = post ? post.id : '';
  document.getElementById('post-title').value   = post ? post.title : '';
  document.getElementById('post-content').value = post ? post.content : '';
  document.getElementById('post-image').value   = post ? (post.image_url || '') : '';
}

/* ── CRUD ── */
async function loadPosts() {
  const list = document.getElementById('posts-list');
  const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
  if (error || !data.length) {
    list.innerHTML = '<div class="empty-state">لا توجد أخبار بعد. أضف أول خبر!</div>';
    return;
  }
  list.innerHTML = data.map(p => `
    <div class="post-item">
      <div class="post-item-info">
        <h3>${p.title}</h3>
        <span>${new Date(p.created_at).toLocaleDateString('ar-MA', { year:'numeric', month:'long', day:'numeric' })}</span>
      </div>
      <div class="post-item-actions">
        <button class="btn btn-blue btn-sm" onclick='editPost(${JSON.stringify(p).replace(/'/g,"&#39;")})'>تعديل</button>
        <button class="btn btn-red btn-sm"  onclick="deletePost('${p.id}')">حذف</button>
      </div>
    </div>
  `).join('');
}

async function savePost() {
  const id      = document.getElementById('edit-id').value;
  const title   = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const image   = document.getElementById('post-image').value.trim() || null;
  if (!title || !content) { showToast('يرجى ملء العنوان والمحتوى'); return; }
  const payload = { title, content, image_url: image };
  const { error } = id
    ? await sb.from('posts').update(payload).eq('id', id)
    : await sb.from('posts').insert(payload);
  if (error) { showToast('حدث خطأ، يرجى المحاولة مرة أخرى'); return; }
  showToast(id ? '✓ تم تحديث الخبر' : '✓ تم نشر الخبر بنجاح');
  showDashboard();
}

function editPost(post) { showPostForm(post); }

async function deletePost(id) {
  if (!confirm('هل أنت متأكد من حذف هذا الخبر؟')) return;
  await sb.from('posts').delete().eq('id', id);
  showToast('✓ تم حذف الخبر');
  loadPosts();
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── INIT ── */
sb.auth.onAuthStateChange((event, session) => {
  if (session) enterApp();
});
</script>
</body>
</html>
