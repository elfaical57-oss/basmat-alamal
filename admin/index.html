<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة — جمعية بصمة الأمل</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #2980b9; --blue-dark: #1a6fa0; --red: #c0392b;
      --white: #fff; --bg: #f0f6fc; --text: #1a1a2e; --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--blue-dark); color: var(--white);
      padding: 0.9rem 2rem; display: flex; align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid var(--red);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .header-actions { display: flex; gap: 0.75rem; align-items: center; }
    .user-email { font-size: 0.85rem; opacity: 0.8; }
    .btn { border: none; border-radius: var(--radius); padding: 0.5rem 1.2rem; font-family: inherit; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-red { background: var(--red); color: var(--white); }
    .btn-blue { background: var(--blue); color: var(--white); }
    .btn-white { background: var(--white); color: var(--blue-dark); }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    }
    .login-card {
      background: var(--white); border-radius: 16px;
      padding: 2.5rem 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-card h2 { color: var(--blue-dark); font-size: 1.4rem; margin-bottom: 0.25rem; }
    .login-card p { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .login-logo { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .form-group { margin-bottom: 1rem; text-align: right; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--blue-dark); margin-bottom: 0.3rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.65rem 0.9rem; border: 2px solid #dde6f0;
      border-radius: var(--radius); font-family: inherit; font-size: 0.95rem;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--blue); }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .login-btn { width: 100%; background: var(--blue); color: var(--white); padding: 0.8rem; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
    .login-btn:hover { background: var(--blue-dark); }
    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

    /* ── DASHBOARD ── */
    #dashboard-screen { display: none; }
    .dashboard { max-width: 900px; margin: 2rem auto; padding: 0 1.25rem; }
    .dash-title { font-size: 1.3rem; font-weight: 900; color: var(--blue-dark); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; }

    /* ── POST FORM ── */
    #post-form-screen { display: none; }
    .form-card { background: var(--white); border-radius: var(--radius); padding: 2rem; max-width: 700px; margin: 2rem auto; box-shadow: 0 2px 16px rgba(41,128,185,0.1); }
    .form-card h2 { color: var(--blue-dark); font-size: 1.2rem; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 3px solid var(--red); }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }

    /* ── POST CARDS ── */
    .posts-list { display: flex; flex-direction: column; gap: 1rem; }
    .post-item {
      background: var(--white); border-radius: var(--radius);
      padding: 1.25rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
      box-shadow: 0 2px 12px rgba(41,128,185,0.08);
      border-right: 5px solid var(--blue);
    }
    .post-item-info h3 { font-size: 1rem; font-weight: 700; color: var(--blue-dark); }
    .post-item-info span { font-size: 0.8rem; color: #888; }
    .post-item-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .empty-state { text-align: center; padding: 3rem; color: #888; font-size: 1rem; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--blue-dark); color: var(--white); padding: 0.75rem 1.5rem; border-radius: 30px; font-weight: 600; font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999; }
    .toast.show { opacity: 1; }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 2px dashed #b0cfe8; border-radius: var(--radius);
      padding: 1.5rem; text-align: center; cursor: pointer;
      color: var(--blue); font-size: 0.9rem; font-weight: 600;
      transition: border-color 0.2s, background 0.2s;
      background: #f5faff;
    }
    .upload-zone:hover { border-color: var(--blue); background: #eaf4fd; }
    .upload-zone.has-image { padding: 0.75rem; border-style: solid; border-color: var(--blue); }

    /* ── TABS ── */
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 3px solid #dde6f0; }
    .tab-btn { background: none; border: none; padding: 0.65rem 1.4rem; font-family: inherit; font-size: 0.95rem; font-weight: 700; color: #888; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color 0.2s, border-color 0.2s; }
    .tab-btn.active { color: var(--blue-dark); border-color: var(--blue); }

    /* ── ABOUT FORM ── */
    .about-section-title {
      font-size: 1rem; font-weight: 700; color: var(--blue-dark);
      margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem;
      border-bottom: 2px solid #dde6f0;
    }
    .card-section {
      background: #f8fbfe; border-radius: var(--radius);
      padding: 1.25rem; margin-bottom: 1rem;
      border: 1px solid #dde6f0;
    }
    .card-section-title {
      font-size: 0.9rem; font-weight: 700; color: var(--blue);
      margin-bottom: 1rem;
    }
    .icon-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .icon-input { width: 70px; font-size: 1.4rem; text-align: center; padding: 0.3rem; border: 2px solid #dde6f0; border-radius: 8px; }
    .icon-preview { font-size: 2rem; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    @media (max-width: 600px) {
      header { padding: 0.6rem 1rem; gap: 0.5rem; flex-wrap: wrap; }
      header h1 { font-size: 0.95rem; white-space: nowrap; }
      .user-email { display: none; }
      .header-actions { gap: 0.4rem; }
      .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.78rem; }
      .dashboard { margin: 0.75rem auto; padding: 0 0.75rem; }
      .post-item { flex-direction: column; align-items: flex-start; }
      .form-row-2 { grid-template-columns: 1fr; }
      .form-card { padding: 1.25rem; }
      .tabs { margin-bottom: 1rem; }
      .tab-btn { padding: 0.55rem 1rem; font-size: 0.88rem; }
    }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🤲</div>
    <h2>جمعية بصمة الأمل</h2>
    <p>لوحة إدارة الأخبار</p>
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" id="login-email" placeholder="example@email.com" dir="ltr" />
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="login-password" placeholder="••••••••" dir="ltr" />
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- ══ HEADER (shown when logged in) ══ -->
<header id="main-header" style="display:none;">
  <h1>🤲 لوحة الإدارة — بصمة الأمل</h1>
  <div class="header-actions">
    <span class="user-email" id="user-email-display"></span>
    <a href="/" class="btn btn-white btn-sm">← الموقع</a>
    <button class="btn btn-red btn-sm" onclick="doLogout()">خروج</button>
  </div>
</header>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard-screen">
  <div class="dashboard">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-news-btn" onclick="switchTab('news')">📰 الأخبار</button>
      <button class="tab-btn" id="tab-about-btn" onclick="switchTab('about')">ℹ️ من نحن</button>
    </div>

    <!-- News panel -->
    <div id="tab-news-panel">
      <div class="dash-title">
        <span>الأخبار المنشورة</span>
        <button class="btn btn-blue" onclick="showPostForm()">+ خبر جديد</button>
      </div>
      <div class="posts-list" id="posts-list">
        <div class="empty-state">جاري التحميل…</div>
      </div>
    </div>

    <!-- About panel -->
    <div id="tab-about-panel" style="display:none;">
      <div class="form-card" style="margin:0; box-shadow:none; padding:0;">
        <h2 style="margin-bottom:1.25rem;">تعديل قسم "من نحن"</h2>

        <p class="about-section-title">النص الرئيسي</p>
        <div class="form-group">
          <label>النص بالعربية</label>
          <textarea id="about-text-ar" rows="3" dir="rtl"></textarea>
        </div>
        <div class="form-group">
          <label>Texte en français</label>
          <textarea id="about-text-fr" rows="3" dir="ltr"></textarea>
        </div>

        <!-- Card 1 -->
        <p class="about-section-title">البطاقة الأولى</p>
        <div class="card-section">
          <div class="card-section-title">البطاقة 1</div>
          <div class="icon-row">
            <label>الأيقونة:</label>
            <input class="icon-input" type="text" id="card1-icon" oninput="document.getElementById('card1-icon-preview').textContent=this.value" />
            <span class="icon-preview" id="card1-icon-preview">🤝</span>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>العنوان (عربي)</label><input type="text" id="card1-title-ar" dir="rtl" /></div>
            <div class="form-group"><label>Titre (français)</label><input type="text" id="card1-title-fr" dir="ltr" /></div>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>النص (عربي)</label><textarea id="card1-text-ar" rows="2" dir="rtl"></textarea></div>
            <div class="form-group"><label>Texte (français)</label><textarea id="card1-text-fr" rows="2" dir="ltr"></textarea></div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="card-section">
          <div class="card-section-title">البطاقة 2</div>
          <div class="icon-row">
            <label>الأيقونة:</label>
            <input class="icon-input" type="text" id="card2-icon" oninput="document.getElementById('card2-icon-preview').textContent=this.value" />
            <span class="icon-preview" id="card2-icon-preview">❤️</span>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>العنوان (عربي)</label><input type="text" id="card2-title-ar" dir="rtl" /></div>
            <div class="form-group"><label>Titre (français)</label><input type="text" id="card2-title-fr" dir="ltr" /></div>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>النص (عربي)</label><textarea id="card2-text-ar" rows="2" dir="rtl"></textarea></div>
            <div class="form-group"><label>Texte (français)</label><textarea id="card2-text-fr" rows="2" dir="ltr"></textarea></div>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="card-section">
          <div class="card-section-title">البطاقة 3</div>
          <div class="icon-row">
            <label>الأيقونة:</label>
            <input class="icon-input" type="text" id="card3-icon" oninput="document.getElementById('card3-icon-preview').textContent=this.value" />
            <span class="icon-preview" id="card3-icon-preview">🌍</span>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>العنوان (عربي)</label><input type="text" id="card3-title-ar" dir="rtl" /></div>
            <div class="form-group"><label>Titre (français)</label><input type="text" id="card3-title-fr" dir="ltr" /></div>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>النص (عربي)</label><textarea id="card3-text-ar" rows="2" dir="rtl"></textarea></div>
            <div class="form-group"><label>Texte (français)</label><textarea id="card3-text-fr" rows="2" dir="ltr"></textarea></div>
          </div>
        </div>

        <!-- Card 4 -->
        <div class="card-section">
          <div class="card-section-title">البطاقة 4</div>
          <div class="icon-row">
            <label>الأيقونة:</label>
            <input class="icon-input" type="text" id="card4-icon" oninput="document.getElementById('card4-icon-preview').textContent=this.value" />
            <span class="icon-preview" id="card4-icon-preview">⭐</span>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>العنوان (عربي)</label><input type="text" id="card4-title-ar" dir="rtl" /></div>
            <div class="form-group"><label>Titre (français)</label><input type="text" id="card4-title-fr" dir="ltr" /></div>
          </div>
          <div class="form-row-2">
            <div class="form-group"><label>النص (عربي)</label><textarea id="card4-text-ar" rows="2" dir="rtl"></textarea></div>
            <div class="form-group"><label>Texte (français)</label><textarea id="card4-text-fr" rows="2" dir="ltr"></textarea></div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-blue" onclick="saveAbout()">💾 حفظ التغييرات</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ══ POST FORM ══ -->
<div id="post-form-screen">
  <div class="form-card" style="margin-top:2rem;">
    <h2 id="form-title">خبر جديد</h2>
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label>العنوان *</label>
      <input type="text" id="post-title" placeholder="عنوان الخبر" />
    </div>
    <div class="form-group">
      <label>المحتوى *</label>
      <textarea id="post-content" placeholder="اكتب محتوى الخبر هنا…"></textarea>
    </div>
    <div class="form-group">
      <label>الصورة (اختياري)</label>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('image-file').click()">
        <div id="upload-placeholder">
          <div style="font-size:2rem;">📷</div>
          <div>انقر لاختيار صورة</div>
          <div style="font-size:0.78rem;opacity:0.6;">JPG, PNG, WEBP — حجم أقصى 5MB</div>
        </div>
        <img id="image-preview" src="" alt="" style="display:none;max-height:180px;border-radius:8px;object-fit:cover;" />
      </div>
      <input type="file" id="image-file" accept="image/*" style="display:none" onchange="previewImage(event)" />
      <input type="hidden" id="post-image" />
      <div id="upload-progress" style="display:none; margin-top:0.5rem;">
        <div style="background:#dde6f0;border-radius:4px;height:6px;">
          <div id="progress-bar" style="background:var(--blue);height:6px;border-radius:4px;width:0%;transition:width 0.3s;"></div>
        </div>
        <div style="font-size:0.8rem;color:var(--blue);margin-top:0.25rem;">جاري رفع الصورة…</div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-blue" onclick="savePost()">حفظ ونشر</button>
      <button class="btn btn-white" onclick="showDashboard()" style="border:2px solid #dde6f0;">إلغاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://yyjbcduakapgblcgqieq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SQxTQ9a2HcskaUmAgFOVrw_qAvbIZlx';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── AUTH ── */
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = 'بريد إلكتروني أو كلمة مرور خاطئة.'; return; }
  enterApp();
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('login-screen').style.display    = 'flex';
  document.getElementById('main-header').style.display     = 'none';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('post-form-screen').style.display = 'none';
}

async function enterApp() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  document.getElementById('login-screen').style.display    = 'none';
  document.getElementById('main-header').style.display     = 'flex';
  document.getElementById('user-email-display').textContent = user.email;
  showDashboard();
  loadPosts();
}

/* ── NAVIGATION ── */
function showDashboard() {
  document.getElementById('dashboard-screen').style.display  = 'block';
  document.getElementById('post-form-screen').style.display  = 'none';
}

function switchTab(tab) {
  document.getElementById('tab-news-btn').classList.toggle('active', tab === 'news');
  document.getElementById('tab-about-btn').classList.toggle('active', tab === 'about');
  document.getElementById('tab-news-panel').style.display  = tab === 'news'  ? 'block' : 'none';
  document.getElementById('tab-about-panel').style.display = tab === 'about' ? 'block' : 'none';
  if (tab === 'news')  loadPosts();
  if (tab === 'about') loadAbout();
}

function showPostForm(post = null) {
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('post-form-screen').style.display = 'block';
  document.getElementById('form-title').textContent = post ? 'تعديل الخبر' : 'خبر جديد';
  document.getElementById('edit-id').value      = post ? post.id : '';
  document.getElementById('post-title').value   = post ? post.title : '';
  document.getElementById('post-content').value = post ? post.content : '';
  document.getElementById('post-image').value   = post ? (post.image_url || '') : '';
  document.getElementById('image-file').value   = '';
  const preview = document.getElementById('image-preview');
  const zone    = document.getElementById('upload-zone');
  if (post && post.image_url) {
    preview.src = post.image_url; preview.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
    zone.classList.add('has-image');
  } else {
    preview.src = ''; preview.style.display = 'none';
    document.getElementById('upload-placeholder').style.display = 'block';
    zone.classList.remove('has-image');
  }
}

/* ── CRUD ── */
async function loadPosts() {
  const list = document.getElementById('posts-list');
  const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
  if (error || !data.length) {
    list.innerHTML = '<div class="empty-state">لا توجد أخبار بعد. أضف أول خبر!</div>';
    return;
  }
  list.innerHTML = data.map(p => `
    <div class="post-item">
      <div class="post-item-info">
        <h3>${p.title}</h3>
        <span>${new Date(p.created_at).toLocaleDateString('ar-MA', { year:'numeric', month:'long', day:'numeric' })}</span>
      </div>
      <div class="post-item-actions">
        <button class="btn btn-blue btn-sm" onclick='editPost(${JSON.stringify(p).replace(/'/g,"&#39;")})'>تعديل</button>
        <button class="btn btn-red btn-sm"  onclick="deletePost('${p.id}')">حذف</button>
      </div>
    </div>
  `).join('');
}

async function savePost() {
  const id      = document.getElementById('edit-id').value;
  const title   = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  if (!title || !content) { showToast('يرجى ملء العنوان والمحتوى'); return; }

  let imageUrl = document.getElementById('post-image').value.trim() || null;
  const fileInput = document.getElementById('image-file');
  if (fileInput.files[0]) {
    imageUrl = await uploadImage(fileInput.files[0]);
    if (!imageUrl) return;
  }

  const payload = { title, content, image_url: imageUrl };
  const { error } = id
    ? await sb.from('posts').update(payload).eq('id', id)
    : await sb.from('posts').insert(payload);
  if (error) { showToast('حدث خطأ، يرجى المحاولة مرة أخرى'); return; }
  showToast(id ? '✓ تم تحديث الخبر' : '✓ تم نشر الخبر بنجاح');
  showDashboard();
}

function editPost(post) { showPostForm(post); }

async function deletePost(id) {
  if (!confirm('هل أنت متأكد من حذف هذا الخبر؟')) return;
  await sb.from('posts').delete().eq('id', id);
  showToast('✓ تم حذف الخبر');
  loadPosts();
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── IMAGE UPLOAD ── */
function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const preview = document.getElementById('image-preview');
  const placeholder = document.getElementById('upload-placeholder');
  const zone = document.getElementById('upload-zone');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  placeholder.style.display = 'none';
  zone.classList.add('has-image');
}

async function uploadImage(file) {
  const ext = file.name.split('.').pop();
  const path = `posts/${Date.now()}.${ext}`;
  const progress = document.getElementById('upload-progress');
  const bar = document.getElementById('progress-bar');
  progress.style.display = 'block';
  bar.style.width = '30%';
  const { data, error } = await sb.storage.from('images').upload(path, file, { upsert: true });
  bar.style.width = '100%';
  setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%'; }, 800);
  if (error) { showToast('فشل رفع الصورة: ' + error.message); console.error('Upload error:', error); return null; }
  const { data: { publicUrl } } = sb.storage.from('images').getPublicUrl(path);
  return publicUrl;
}

/* ── ABOUT ── */
async function loadAbout() {
  const { data, error } = await sb.from('about').select('*').eq('id', 1).single();
  if (error || !data) return;
  document.getElementById('about-text-ar').value  = data.text_ar  || '';
  document.getElementById('about-text-fr').value  = data.text_fr  || '';
  [1, 2, 3, 4].forEach(n => {
    const icon = data['card' + n + '_icon'] || '';
    document.getElementById('card' + n + '-icon').value = icon;
    document.getElementById('card' + n + '-icon-preview').textContent = icon;
    document.getElementById('card' + n + '-title-ar').value = data['card' + n + '_title_ar'] || '';
    document.getElementById('card' + n + '-title-fr').value = data['card' + n + '_title_fr'] || '';
    document.getElementById('card' + n + '-text-ar').value  = data['card' + n + '_text_ar']  || '';
    document.getElementById('card' + n + '-text-fr').value  = data['card' + n + '_text_fr']  || '';
  });
}

async function saveAbout() {
  const payload = {
    id: 1,
    text_ar: document.getElementById('about-text-ar').value.trim(),
    text_fr: document.getElementById('about-text-fr').value.trim(),
  };
  [1, 2, 3, 4].forEach(n => {
    payload['card' + n + '_icon']     = document.getElementById('card' + n + '-icon').value.trim();
    payload['card' + n + '_title_ar'] = document.getElementById('card' + n + '-title-ar').value.trim();
    payload['card' + n + '_title_fr'] = document.getElementById('card' + n + '-title-fr').value.trim();
    payload['card' + n + '_text_ar']  = document.getElementById('card' + n + '-text-ar').value.trim();
    payload['card' + n + '_text_fr']  = document.getElementById('card' + n + '-text-fr').value.trim();
  });
  const { error } = await sb.from('about').upsert(payload, { onConflict: 'id' });
  if (error) { showToast('حدث خطأ أثناء الحفظ'); return; }
  showToast('✓ تم حفظ قسم "من نحن" بنجاح');
}

sb.auth.onAuthStateChange((event, session) => {
  if (session) enterApp();
});
