backend:
  name: git-gateway
  branch: master

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: ar

collections:
  - name: "posts"
    label: "الأخبار / Actualités"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "العنوان / Titre", name: "title", widget: "string" }
      - { label: "التاريخ / Date", name: "date", widget: "datetime" }
      - { label: "صورة / Image", name: "image", widget: "image", required: false }
      - { label: "المحتوى / Contenu", name: "body", widget: "markdown" }
